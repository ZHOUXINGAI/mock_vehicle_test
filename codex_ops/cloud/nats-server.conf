server_name: codex-coordinator
host: 0.0.0.0
port: 4222
http: 0.0.0.0:8222

jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 5GB
}

tls {
  cert_file: /etc/nats/certs/server.crt
  key_file: /etc/nats/certs/server.key
  ca_file: /etc/nats/certs/ca.crt
  verify_and_map: true
  min_version: "1.2"
  timeout: 3
}

authorization {
  users = [
    {
      user: "CN=boss"
      permissions: {
        publish: ">"
        subscribe: ">"
      }
    },
    {
      user: "CN=orin1-carrier"
      permissions: {
        publish: [
          "codex.event.orin1-carrier",
          "codex.heartbeat.orin1-carrier",
          "codex.task.orin2-mini",
          "$JS.API.>",
          "$JS.ACK.>"
        ]
        subscribe: [
          "codex.task.orin1-carrier",
          "_INBOX.>"
        ]
      }
    },
    {
      user: "CN=orin2-mini"
      permissions: {
        publish: [
          "codex.event.orin2-mini",
          "codex.heartbeat.orin2-mini",
          "codex.task.orin1-carrier",
          "$JS.API.>",
          "$JS.ACK.>"
        ]
        subscribe: [
          "codex.task.orin2-mini",
          "_INBOX.>"
        ]
      }
    }
  ]
}

write_deadline: 10s
max_payload: 1MB
